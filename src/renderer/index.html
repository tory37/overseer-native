<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overseer</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #1e1e1e; /* Fallback before theme loads */
      }
      @keyframes overseer-idle-breath {
        from { transform: translateY(0); }
        to { transform: translateY(3px); }
      }
      @keyframes overseer-thinking-wobble {
        0% { transform: scale(1) rotate(0deg); }
        25% { transform: scale(1.02) rotate(-1deg); }
        75% { transform: scale(1.02) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      @keyframes overseer-speaking-pulse {
        0% { transform: scale(1); }
        100% { transform: scale(1); }
      }
      .overseer-sprite-idle { animation: overseer-idle-breath 3s ease-in-out infinite alternate; }
      .overseer-sprite-thinking { animation: overseer-thinking-wobble 0.6s ease-in-out infinite; }
      .overseer-sprite-speaking { /* No body animation during speaking, only mouth moves */ }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="overlay-root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
